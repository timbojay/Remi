name: Remi
options:
  bundleIdPrefix: com.remi
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  Remi:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: Remi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remi.app
        INFOPLIST_KEY_CFBundleDisplayName: Remi
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Remi connects to a local AI backend running on your machine."
        CODE_SIGN_ENTITLEMENTS: Remi/Remi.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
